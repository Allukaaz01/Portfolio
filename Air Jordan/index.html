<body>

      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

  <section class="hero">
    <h1>New Sneaker Collection</h1>
    <p>Discover the best sneakers</p>
    <a href="collection.html" class="shop-now-btn">Shop Now</a>
  </section>

<!-- Sneaker Cards -->

    <div class="card">

    <div class="card">
